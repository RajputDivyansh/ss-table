name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 23
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'

    - name: Verify Java Version
      run: java -version

    - name: Build Maven Project
      run: mvn clean install

    - name: SonarQube Analysis
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=ss-table \
          -Dsonar.host.url=http://56.228.3.40:9000 \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
