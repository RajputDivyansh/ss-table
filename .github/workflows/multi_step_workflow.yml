name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  checkout:
    name: Checkout Source
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

  setup-java:
    name: Setup Java
    runs-on: self-hosted
    needs: checkout

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 23
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'

    - name: Verify Java Version
      run: java -version

  build:
    name: Build Maven Project
    runs-on: self-hosted
    needs: setup-java

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 23
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'

    - name: Build Project
      run: mvn clean install

  sonar-analysis:
    name: SonarQube Analysis
    runs-on: self-hosted
    needs: build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 23
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '23'

    - name: Run SonarQube Analysis
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=ss-table \
          -Dsonar.host.url=http://56.228.3.40:9000 \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
