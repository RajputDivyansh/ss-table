apiVersion: apps/v1
kind: Deployment
metadata:
  name: ss-table
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ss-table
  template:
    metadata:
      labels:
        app: ss-table
    spec:
      containers:
      - name: ss-table
        image: divyansh/ss-table:latest    # 👈 LOCAL IMAGE (important)
        imagePullPolicy: Never   # 👈 forces local image usage
        ports:
        - containerPort: 8080
